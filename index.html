<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Touch and App Viewport Control -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Mobile PWA Standalone Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ScanNest" />
    <meta name="theme-color" content="#4f46e5" />
    
    <!-- PWA Manifest Linking -->
    <link rel="manifest" href="/manifest.json" />

    <!-- SEO Best Practices -->
    <title>ScanNest — Calm Local-First Document & QR Scanner</title>
    <meta name="description" content="A beautiful, lightweight, privacy-respecting mobile-first scanner PWA for students. Scan documents to PDFs, read QR codes offline, and store everything securely on-device." />
    
    <!-- Modern Typography: Plus Jakarta Sans from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Simple Offline Service Worker registration safe-guard -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('ScanNest ServiceWorker registered: ', reg.scope))
            .catch(err => console.log('ScanNest ServiceWorker registration failed: ', err));
        });
      }
    </script>
  </body>
</html>
